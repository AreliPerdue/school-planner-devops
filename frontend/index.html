<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>School Planner</title>
</head>
<body>

    <h1>📚 School Planner</h1>

    <h2>Agregar tarea</h2>

    <input type="text" id="title" placeholder="Título"><br><br>
    <input type="text" id="subject" placeholder="Materia"><br><br>
    <input type="date" id="due_date"><br><br>

    <button onclick="addTask()">Guardar tarea</button>

    <h2>📋 Lista de tareas</h2>
    <button onclick="loadTasks()">Cargar tareas</button>

    <ul id="taskList"></ul>

    <script>

        const API_URL = window.location.protocol + "//" + window.location.hostname + ":3000";

        function addTask() {
            const title = document.getElementById("title").value;
            const subject = document.getElementById("subject").value;
            const due_date = document.getElementById("due_date").value;

            fetch(API_URL + "/task", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ title, subject, due_date })
            })
            .then(res => res.json())
            .then(data => {
                alert("Tarea guardada");
                loadTasks();
            });
        }

        function loadTasks() {
    fetch(API_URL + "/tasks")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("taskList");
        list.innerHTML = "";

        data.forEach(task => {
            const li = document.createElement("li");

            const fecha = new Date(task.due_date).toLocaleDateString();

            li.innerHTML = `
   		 <input value="${task.title}" id="title-${task.id}">
   		 <input value="${task.subject}" id="subject-${task.id}">
   	 	<input type="date" value="${task.due_date.split('T')[0]}" id="date-${task.id}">

	   	 <button onclick="updateTask(${task.id})">💾</button>
   		 <button onclick="deleteTask(${task.id})">❌</button>
		`;

            list.appendChild(li);
        });
    });
}

function deleteTask(id) {
    fetch(API_URL + "/task/" + id, {
        method: "DELETE"
    })
    .then(() => loadTasks());
}

function editTask(id) {
    const title = prompt("Nuevo título:");
    const subject = prompt("Nueva materia:");
    const due_date = prompt("Nueva fecha (YYYY-MM-DD):");

    fetch(API_URL + "/task/" + id, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ title, subject, due_date })
    })
    .then(() => loadTasks());
}

function updateTask(id) {
    const title = document.getElementById(`title-${id}`).value;
    const subject = document.getElementById(`subject-${id}`).value;
    const due_date = document.getElementById(`date-${id}`).value;

    fetch(API_URL + "/task/" + id, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ title, subject, due_date })
    })
    .then(res => res.json())
    .then(() => {
        alert("✅ Tarea actualizada exitosamente");
        loadTasks();
    });
}

</script>
</body>
</html>
